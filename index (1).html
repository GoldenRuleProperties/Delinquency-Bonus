<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delinquency Summary</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #F1F5F9; color: #0F172A; padding: 24px; }
  .container { max-width: 800px; margin: 0 auto; }
  .header { background: #FFFFFF; border-radius: 12px; padding: 20px 24px; margin-bottom: 16px; }
  .header-title { font-size: 20px; font-weight: 500; color: #1E3A5F; }
  .header-sub { font-size: 13px; color: #64748B; margin-top: 4px; }
  .panel { background: #FFFFFF; border-radius: 12px; padding: 0; overflow: hidden; margin-bottom: 16px; }
  .report-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; text-decoration: none; color: inherit; }
  a.report-row:hover { background: #F8FAFC; }
  .unavailable { cursor: default; opacity: 0.55; }
  .row-month { font-size: 15px; font-weight: 500; color: #1E3A5F; }
  .unavail-month { color: #64748B; }
  .row-pct { font-size: 12px; color: #64748B; margin-top: 2px; }
  .row-bonus { font-size: 16px; font-weight: 500; color: #1E40AF; }
  .unavail-bonus { color: #94A3B8; }
  .row-arrow { font-size: 16px; color: #94A3B8; }
  .footer { text-align: center; font-size: 12px; color: #94A3B8; margin-top: 8px; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-title">Delinquency Summary</div>
    <div class="header-sub">Clarisa Ramirez &middot; monthly bonus calculation history</div>
  </div>

  <div class="panel">
        <div class="report-row unavailable" style="border-bottom: 1px solid #F1F5F9;">
          <div>
            <div class="row-month unavail-month">February 2026</div>
            <div class="row-pct">3.63% delinquent</div>
          </div>
          <div style="display:flex;align-items:center;gap:12px;">
            <span class="row-bonus unavail-bonus">$250</span>
          </div>
        </div>
        <div class="report-row unavailable" style="border-bottom: 1px solid #F1F5F9;">
          <div>
            <div class="row-month unavail-month">March 2026</div>
            <div class="row-pct">2.97% delinquent</div>
          </div>
          <div style="display:flex;align-items:center;gap:12px;">
            <span class="row-bonus unavail-bonus">$400</span>
          </div>
        </div>
        <a href="apr-2026.html" class="report-row" style="border-bottom: 1px solid #F1F5F9;">
          <div>
            <div class="row-month">April 2026</div>
            <div class="row-pct">4.72% delinquent</div>
          </div>
          <div style="display:flex;align-items:center;gap:12px;">
            <span class="row-bonus">$150</span>
            <span class="row-arrow">&rarr;</span>
          </div>
        </a>
        <a href="may-2026.html" class="report-row" style="">
          <div>
            <div class="row-month">May 2026</div>
            <div class="row-pct">5.40% delinquent</div>
          </div>
          <div style="display:flex;align-items:center;gap:12px;">
            <span class="row-bonus">$0</span>
            <span class="row-arrow">&rarr;</span>
          </div>
        </a>
  </div>

  <div class="footer">New reports are added here each month.</div>

</div>
</body>
</html>
